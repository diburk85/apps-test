name: Run TSLA Stock Agent

on:
  schedule:
    # 4 PM Central Time (CT) on March 1, 2026
    # CT = UTC-6 (assuming standard time)
    # 4 PM CT = 22:00 UTC
    - cron: '0 22 1 3 *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Agent
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python agent.py